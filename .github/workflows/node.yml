name: Node.js CI

on:

  push:

    branches:

      - main

      - master

  pull_request:

    branches:

      - main

      - master

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Check project
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present