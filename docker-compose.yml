version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: mini-crm-postgres

    restart: always

    environment:

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

      POSTGRES_DB: mini_crm

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:latest

    container_name: mini-crm-redis

    restart: always

    ports:

      - "6379:6379"

  app:

    build: .

    container_name: mini-crm-app

    restart: always

    depends_on:

      - postgres

      - redis

    ports:

      - "3000:3000"

    env_file:

      - .env.docker

volumes:

  postgres_data: